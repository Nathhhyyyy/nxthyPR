name: Android CI 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      # Using the 2026 stable version of the Gradle action
      uses: gradle/actions/setup-gradle@v4

    - name: Build APK
      # This will now work even without the gradlew files in your repo
      run: gradle assembleDebug

    - name: Upload APK
      # v4 is the minimum required version in 2026
      uses: actions/upload-artifact@v4
      with:
        name: nxthyPR-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
