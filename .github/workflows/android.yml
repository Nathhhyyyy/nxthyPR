name: Android CI 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      # We are forcing GitHub to use Gradle 7.5, which is compatible with our code
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.5'

    - name: Build APK
      # This will now use the 7.5 version we just installed
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nxthyPR-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
