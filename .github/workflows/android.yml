name: Android CI 2026 Universal

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      # This version is fully compatible with June 2026 standards
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.4'

    - name: Build Universal APK
      # This command will build the APK that works on Android 4.4 up to Android 15+
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nxthyPR-universal-apk
        path: app/build/outputs/apk/debug/app-debug.apk
