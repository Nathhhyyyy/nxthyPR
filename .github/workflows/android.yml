name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    - name: Build with Gradle
      run: bash ./gradlew assembleDebug || (wget https://raw.githubusercontent.com/gradle/gradle/master/gradlew && chmod +x gradlew && ./gradlew assembleDebug )
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: nxthyPR-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
